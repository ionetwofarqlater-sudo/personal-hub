<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Підтвердження реєстрації</title>
  </head>
  <body style="margin:0;padding:0;background:#0b1020;font-family:Inter,Segoe UI,Arial,sans-serif;color:#e5e7eb;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#111827;border:1px solid #1f2937;border-radius:16px;overflow:hidden;">
            <tr>
              <td style="padding:24px 24px 8px 24px;">
                <p style="margin:0;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:#93c5fd;">Personal Hub</p>
                <h1 style="margin:10px 0 0 0;font-size:24px;line-height:1.3;color:#ffffff;">Підтверди реєстрацію</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 24px;">
                <p style="margin:0 0 14px 0;font-size:15px;line-height:1.6;color:#d1d5db;">Вітаю! Щоб завершити створення акаунта, введи цей код на сторінці підтвердження:</p>
                <div style="margin:0 0 18px 0;background:#0f172a;border:1px solid #334155;border-radius:12px;padding:14px 18px;text-align:center;">
                  <span style="font-size:30px;letter-spacing:0.22em;font-weight:700;color:#f8fafc;">{{ .Token }}</span>
                </div>
                <p style="margin:0 0 14px 0;font-size:13px;line-height:1.6;color:#9ca3af;">Код діє обмежений час. Якщо ти не реєструвався, просто проігноруй цей лист.</p>
                <p style="margin:0;font-size:13px;line-height:1.6;color:#9ca3af;">Альтернатива: <a href="{{ .ConfirmationURL }}" style="color:#93c5fd;">підтвердити через посилання</a>.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:0 24px 24px 24px;">
                <p style="margin:0;font-size:12px;color:#6b7280;">© {{ .SiteURL }} · Personal Hub</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
